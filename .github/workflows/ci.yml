name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q bot
      - name: Import check
        run: python -c "from bot.application.bot import SignalBot"
      - name: Validate config/runtime invariants
        run: python scripts/validate_config.py
      - name: Tests
        run: pytest -q tests/
