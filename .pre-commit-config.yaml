repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: ["--follow-imports=skip", "--ignore-missing-imports", "bot/ml/filter.py", "bot/confluence.py"]
        pass_filenames: false
