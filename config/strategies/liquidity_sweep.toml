# Liquidity Sweep Strategy Configuration

[strategy]
enabled = true
name = "liquidity_sweep"

[detection]
# Sweep detection
sweep_atr_mult = 0.2
reclaim_threshold = 0.3

# Liquidity lookback
swing_lookback_n = 5

[risk_management]
