min_rr = 1.5

[bot.strategies.bos_choch]
enabled = true
base_score = 0.53
# Structure detection
swing_lookback = 5
break_confirmation_bars = 2
# SL/TP
sl_buffer_atr = 0.5
min_rr = 1.5

# ============================================
# Global Strategy Settings (applied to all)
# ============================================
[bot.strategies.global]
# Default SL buffer if not specified per strategy
default_sl_buffer_atr = 0.5
# Default risk/reward minimum
default_min_rr = 1.5
# Maximum signals per cycle per symbol
max_signals_per_symbol = 1
# Cooldown between signals (minutes)
default_cooldown_minutes = 60
